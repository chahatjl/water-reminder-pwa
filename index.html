<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vishali's Hydration Companion</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vishali Drips">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3105/3105803.png">

    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Vishali's%20Hydration%20Reminder%22%2C%22short_name%22%3A%22VishaliHydrates%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0fdfa%22%2C%22theme_color%22%3A%22%230ea5e9%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F3105%2F3105803.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%23png%22%7D%5D%7D">
    <meta name="theme-color" content="#0ea5e9">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes wave {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-6px) scaleY(1.02); }
        }
        .animate-wave { animation: wave 4s ease-in-out infinite; }
        
        @keyframes slideUp {
            0% { transform: translateY(120px); opacity: 0; }
            8% { transform: translateY(0); opacity: 1; }
            92% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(120px); opacity: 0; }
        }
        .toast-animation { animation: slideUp 5.5s ease-in-out forwards; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-blue-100 min-h-screen font-sans flex flex-col items-center justify-between p-4 selection:bg-sky-200" onclick="unlockAudioContext()">

    <header class="w-full max-w-md text-center pt-4 relative">
        <button id="sound-btn" onclick="toggleMute(event)" class="absolute right-2 top-4 bg-white/80 backdrop-blur-sm text-sky-600 shadow-sm border border-sky-100 w-9 h-9 rounded-xl flex items-center justify-center active:scale-90 transition">
            <i id="sound-icon" class="fa-solid fa-volume-high"></i>
        </button>
        
        <h1 class="text-2xl font-black text-sky-950 tracking-tight flex items-center justify-center gap-2 pr-6">
            <i class="fa-solid fa-droplet text-sky-500 animate-bounce"></i> Vishali's Hydration
        </h1>
    </header>

    <main class="w-full max-w-md bg-white/80 backdrop-blur-md rounded-3xl p-5 shadow-xl border border-sky-100 flex flex-col items-center space-y-4 my-auto">
        
        <div class="w-full bg-white/90 border border-sky-100 rounded-2xl p-3 flex flex-col items-center space-y-1 shadow-sm">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Set Alert Frequency</span>
            <div class="flex items-center justify-center gap-5">
                <button onclick="adjustInterval(-5, event)" class="w-10 h-8 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold active:scale-90 transition flex items-center justify-center gap-0.5 text-xs">
                    -5m
                </button>
                <div class="text-center min-w-[90px]">
                    <span id="interval-display" class="text-3xl font-black text-sky-950">60</span>
                    <span class="text-xs font-bold text-sky-600 block -mt-1">minutes</span>
                </div>
                <button onclick="adjustInterval(5, event)" class="w-10 h-8 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold active:scale-90 transition flex items-center justify-center gap-0.5 text-xs">
                    +5m
                </button>
            </div>
        </div>

        <div class="relative w-28 h-28 bg-sky-100 rounded-full flex items-center justify-center border-4 border-white shadow-inner animate-wave">
            <i class="fa-solid fa-glass-water text-5xl text-sky-500"></i>
        </div>

        <div class="text-center w-full">
            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Countdown Intercept</p>
            <p id="countdown" class="text-4xl font-mono font-black text-slate-700 tracking-tight mt-0.5">60:00</p>
        </div>

        <button id="silence-btn" onclick="stopLongAlarm(event)" class="hidden w-full bg-rose-500 hover:bg-rose-600 text-white font-black py-3.5 px-4 rounded-2xl shadow-lg transition animate-pulse flex items-center justify-center gap-2 text-sm">
            <i class="fa-solid fa-circle-stop text-lg"></i> Stop Alarm Notification, Vishali!
        </button>

        <div class="bg-sky-50/60 rounded-2xl p-3 w-full text-center border border-sky-100/40">
            <p class="text-[11px] font-bold uppercase tracking-wider text-sky-800">Target Volume Log</p>
            <div class="flex items-center justify-center gap-6 mt-1">
                <button onclick="updateCount(-1, event)" class="w-9 h-9 rounded-full bg-white text-sky-600 shadow-sm border border-sky-100 font-bold active:scale-90 transition flex items-center justify-center text-lg">-</button>
                <span id="glass-count" class="text-3xl font-black text-sky-950">0</span>
                <button onclick="updateCount(1, event)" class="w-9 h-9 rounded-full bg-sky-600 text-white shadow-sm font-bold active:scale-90 transition flex items-center justify-center text-lg">+</button>
            </div>
        </div>

        <div class="w-full space-y-1.5">
            <button id="noti-btn" onclick="requestNotificationPermission()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition flex items-center justify-center gap-2 text-xs uppercase tracking-wider">
                <i class="fa-solid fa-bell"></i> Authorize Background Push Engine
            </button>
            
            <button onclick="triggerTestReminder()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-2 px-4 rounded-xl transition text-[11px] flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-vial"></i> Run System Test (Push & Vibrate)
            </button>
        </div>

        <div id="ios-tip" class="hidden text-left bg-blue-50 border border-blue-200 rounded-xl p-3 text-[11px] text-blue-800 space-y-1">
            <p class="font-bold"><i class="fa-solid fa-circle-info"></i> iPhone Deployment Requirement:</p>
            <p>Tap <span class="font-bold">Share <i class="fa-solid fa-share-from-square"></i></span>, then choose <span class="font-bold">"Add to Home Screen"</span>. Launch that icon to activate background execution routines.</p>
        </div>

    </main>

    <footer class="w-full max-w-md text-center pb-2 text-[10px] text-sky-400 font-medium tracking-wide">
        ENGINEERED WITH ❤️ FOR VISHALI
    </footer>

    <div id="toast-container" class="fixed bottom-6 left-4 right-4 md:left-auto md:right-6 md:max-w-sm z-50 pointer-events-none"></div>

    <script>
        const personalizedToasts = [
            "Drink up, beautiful Vishali! Keep that glow going. ✨",
            "Time for a water break, Vishali! Your resident engineer orders you to hydrate. 💻❤️",
            "Hydration check, Vishali! Sending you a massive hug with this glass of water. 🤗💧",
            "A healthy fiancée is a happy fiancée! Take a big sip, Vishali. 🥂",
            "Just your hourly reminder that you are incredibly loved, Vishali... now go drink water! 🥰",
            "Hey Vishali, pause whatever you are doing and take 3 big gulps right now! 🕒",
            "Your skin and energy levels will thank you for this sip, Vishali! 💫"
        ];

        // System Constants & Registers
        let reminderIntervalMins = parseInt(localStorage.getItem('reminderIntervalMins')) || 60;
        let glassCount = parseInt(localStorage.getItem('glassCount')) || 0;
        let clockIntervalId = null;
        
        let audioCtx = null;
        let isMuted = localStorage.getItem('appMuted') === 'true';
        let alarmIntervalId = null;
        let alarmTimeoutId = null;

        document.getElementById('glass-count').innerText = glassCount;
        document.getElementById('interval-display').innerText = reminderIntervalMins;
        updateMuteUI();

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        
        if (isIOS && !isStandalone) {
            document.getElementById('ios-tip').classList.remove('hidden');
        }

        // --- DYNAMIC FREQUENCY MATRIX ---
        function adjustInterval(amount, e) {
            if(e) e.stopPropagation();
            reminderIntervalMins = Math.max(1, Math.min(360, reminderIntervalMins + amount)); 
            localStorage.setItem('reminderIntervalMins', reminderIntervalMins);
            document.getElementById('interval-display').innerText = reminderIntervalMins;
            
            setNextTargetTime();
            syncUI();
            showPersonalizedToast(`Reminder intervals re-calibrated to ${reminderIntervalMins}m! ⏱️`);
        }

        // --- HARDWARE SOUND SYNTHESIS (UPGRADED HIGH-VOLUME ENGINE) ---
        function unlockAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playDropletChime() {
            if (isMuted) return;
            unlockAudioContext();
            if (!audioCtx) return;

            const now = audioCtx.currentTime;
            
            // Channel 1: High-amplitude piercing crisp fundamental wave
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880, now); // Higher clear A5 note
            osc1.frequency.exponentialRampToValueAtTime(440, now + 0.3); // Linear drop curve
            
            gain1.gain.setValueAtTime(1.0, now); // Max structural web audio volume (100% capacity)
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.45);

            // Channel 2: Rich bright harmonizing wave to cut through device chassis noise
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle'; // Resonant body structure
            osc2.frequency.setValueAtTime(1320, now); // High E6 harmonic ring
            
            gain2.gain.setValueAtTime(0.6, now); // Boosted supplemental overlay volume
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now);
            osc2.stop(now + 0.35);
        }

        // --- HARDWARE BACKGROUND HAPTIC SYSTEM ---
        function executeHapticVibration() {
            if ('vibrate' in navigator) {
                navigator.vibrate([500, 250, 500, 250, 800]);
            }
        }

        function startLongAlarm() {
            if (isMuted) return;
            stopLongAlarm();
            document.getElementById('silence-btn').classList.remove('hidden');
            
            playDropletChime();
            executeHapticVibration();

            alarmIntervalId = setInterval(() => { 
                playDropletChime(); 
                executeHapticVibration();
            }, 2000); // Tighter sounding sequence pulse loop every 2 seconds
            
            alarmTimeoutId = setTimeout(() => { stopLongAlarm(); }, 60000); 
        }

        function stopLongAlarm(e) {
            if(e) e.stopPropagation();
            if (alarmIntervalId) { clearInterval(alarmIntervalId); alarmIntervalId = null; }
            if (alarmTimeoutId) { clearTimeout(alarmTimeoutId); alarmTimeoutId = null; }
            document.getElementById('silence-btn').classList.add('hidden');
            if ('vibrate' in navigator) navigator.vibrate(0); 
        }

        function toggleMute(e) {
            e.stopPropagation();
            isMuted = !isMuted;
            localStorage.setItem('appMuted', isMuted);
            updateMuteUI();
            if (isMuted) stopLongAlarm(); else playDropletChime();
        }

        function updateMuteUI() {
            const icon = document.getElementById('sound-icon');
            icon.className = isMuted ? "fa-solid fa-volume-xmark text-rose-500" : "fa-solid fa-volume-high text-emerald-500";
        }

        // --- WALL-CLOCK TIMELINE INTERCEPT ---
        function setNextTargetTime() {
            const targetTimestamp = Date.now() + (reminderIntervalMins * 60 * 1000);
            localStorage.setItem('hydrationTargetTime', targetTimestamp);
        }

        function syncUI() {
            const now = Date.now();
            const target = parseInt(localStorage.getItem('hydrationTargetTime') || now);
            const timeLeftMs = target - now;

            if (timeLeftMs <= 0) {
                triggerReminder();
                setNextTargetTime();
                updateVisualCountdown(parseInt(localStorage.getItem('hydrationTargetTime')) - now);
            } else {
                updateVisualCountdown(timeLeftMs);
            }
        }

        function runClockEngine() {
            if (clockIntervalId) clearInterval(clockIntervalId);
            if (!localStorage.getItem('hydrationTargetTime')) {
                setNextTargetTime();
            }
            syncUI();
            clockIntervalId = setInterval(() => { syncUI(); }, 1000);
        }

        function updateVisualCountdown(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('countdown').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                syncUI();
            }
        });

        function updateCount(val, e) {
            if(e) e.stopPropagation();
            glassCount = Math.max(0, glassCount + val);
            localStorage.setItem('glassCount', glassCount);
            document.getElementById('glass-count').innerText = glassCount;
            
            if(val > 0) {
                stopLongAlarm();
                setNextTargetTime(); 
                syncUI();
                playDropletChime();
                showPersonalizedToast("Amazing job staying on track, Vishali! 🎉");
            }
        }

        // --- SYSTEM OS INTER-PROCESS NOTIFICATIONS ---
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                alert('Web System Push notifications are locked or unsupported on this native client.');
                return;
            }
            Notification.requestPermission().then(permission => {
                updateNotificationButton(permission);
                if (permission === 'granted') {
                    playDropletChime();
                    executeHapticVibration();
                    showPersonalizedToast("System core sync active, Vishali! 🔔");
                }
            });
        }

        function updateNotificationButton(permission) {
            const btn = document.getElementById('noti-btn');
            if (permission === 'granted') {
                btn.className = "w-full bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl shadow-md pointer-events-none flex items-center justify-center gap-2 text-xs tracking-wider";
                btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> Background Engine Active`;
            } else if (permission === 'denied') {
                btn.className = "w-full bg-rose-500 text-white font-bold py-3 px-4 rounded-xl shadow-md text-xs tracking-wider";
                btn.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Alerts Blocked By Device`;
            }
        }

        function showPersonalizedToast(forcedMessage = null) {
            const container = document.getElementById('toast-container');
            const message = forcedMessage || personalizedToasts[Math.floor(Math.random() * personalizedToasts.length)];
            
            const toast = document.createElement('div');
            toast.className = "toast-animation bg-slate-900 text-white font-medium p-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-slate-800 pointer-events-auto mb-3 text-xs";
            toast.innerHTML = `
                <div class="bg-sky-500 p-2 rounded-xl text-white"><i class="fa-solid fa-heart animate-pulse"></i></div>
                <div>${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 5500);
        }

        function triggerReminder() {
            showPersonalizedToast();
            startLongAlarm();
            executeNativeSystemPush();
        }

        function triggerTestReminder() {
            showPersonalizedToast();
            startLongAlarm();
            executeNativeSystemPush("Hardware Haptic Trigger! 💧", "Hey Vishali! Verifying push notification and physical vibration sequences.");
        }

        function executeNativeSystemPush(title = "Time to Drink Water, Vishali! 💧", body = "Take a break, stretch, and finish a fresh glass of water right now.") {
            if (Notification.permission === "granted") {
                const systemManifestOptions = {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/3105/3105803.png",
                    badge: "https://cdn-icons-png.flaticon.com/512/3105/3105803.png",
                    vibrate: [500, 250, 500, 250, 800],
                    tag: 'hydration-core-alarm',
                    renotify: true,
                    requireInteraction: true 
                };

                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification(title, systemManifestOptions);
                    });
                } else {
                    new Notification(title, systemManifestOptions);
                }
            }
        }

        // --- BACKGROUND SERVICE WORKER ROUTINES ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                
                self.addEventListener('notificationclick', e => {
                    e.notification.close();
                    e.waitUntil(
                        clients.matchAll({ type: 'window', includeUncontrolled: true }).then(clientList => {
                            if (clientList.length > 0) return clientList[0].focus();
                            return clients.openWindow('.');
                        })
                    );
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.error(err));
        }

        // Initialize Timing Trackers
        runClockEngine();
    </script>
</body>
</html>
